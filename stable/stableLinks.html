<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Felicity | Find Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>Find Support Services</header>

<section class="filters">
  <select id="conditionFilter">
    <option value="all">All Conditions</option>
    <option value="autism">Autism</option>
    <option value="adhd">ADHD</option>
    <option value="speech">Speech Delay</option>
  </select>

  <select id="cityFilter">
    <option value="all">All Cities</option>
    <option value="mumbai">Mumbai</option>
    <option value="pune">Pune</option>
  </select>

  <input type="text" id="searchInput" placeholder="Search services..." />
</section>

<main id="services" class="services"></main>

<script src="script.js"></script>
</body>
</html>
